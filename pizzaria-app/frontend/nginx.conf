server {
    listen 80;
    server_name localhost;

    # Localização padrão para servir os arquivos do React
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        # Essencial para que o roteamento do React (React Router) funcione
        try_files $uri $uri/ /index.html;
    }

    # ---> AQUI ESTÁ A MÁGICA DO PROXY REVERSO <---
    # Qualquer requisição que comece com /api/ será enviada para este bloco
    location /api/ {
        # O nome do serviço 'backend' do seu docker-compose e a porta INTERNA dele
        proxy_pass http://backend:5000/;
        
        # Cabeçalhos importantes para o proxy funcionar corretamente
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
